<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#b9ff66"/>
      <stop offset="100%" stop-color="#66ffa3"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Accent line -->
  <rect x="80" y="180" width="120" height="4" rx="2" fill="url(#accent)"/>
  
  <!-- Company name -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="white" letter-spacing="-2">Avenue Advisors</text>
  
  <!-- Tagline -->
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.7)">Intelligent Infrastructure for</text>
  <text x="80" y="375" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="rgba(255,255,255,0.7)">Commercial Real Estate</text>
  
  <!-- Services -->
  <text x="80" y="460" font-family="system-ui, monospace" font-size="18" fill="url(#accent)">DATA GOVERNANCE  ·  AI IMPLEMENTATION  ·  AGENTIC WORKFLOWS</text>
  
  <!-- Website URL -->
  <text x="80" y="560" font-family="system-ui, monospace" font-size="20" fill="rgba(255,255,255,0.4)">avenueadvisors.ai</text>
  
  <!-- Corner accent -->
  <circle cx="1100" cy="300" r="200" fill="none" stroke="rgba(185,255,102,0.08)" stroke-width="1"/>
  <circle cx="1100" cy="300" r="140" fill="none" stroke="rgba(185,255,102,0.05)" stroke-width="1"/>
</svg>